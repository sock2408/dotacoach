<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 AI Ассистент — Разбор матчей</title>
    <!-- Tailwind CSS через CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Дополнительные анимации */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border-top-color: #ef4444;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .match-active {
            border-left: 4px solid #ef4444;
            background-color: rgba(55, 65, 81, 0.8);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen font-sans antialiased">

    <div id="app" class="max-w-7xl mx-auto w-full p-4 md:p-6 flex flex-col gap-6">
        
        <!-- ===== ШАПКА ===== -->
        <header class="flex flex-col md:flex-row items-center gap-4 bg-gray-900 rounded-xl p-4 shadow-lg">
            <div class="flex items-center gap-4 flex-1">
                <!-- Аватар игрока (заглушка) -->
                <div class="w-14 h-14 rounded-full bg-gray-700 flex items-center justify-center overflow-hidden flex-shrink-0">
                    <svg class="w-10 h-10 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold">ID: <span id="playerIdDisplay" class="text-white">Неизвестно</span></h1>
                    <div class="flex items-center gap-2 text-sm mt-1">
                        <span class="text-yellow-400 text-lg leading-none">★</span>
                        <span id="playerRank" class="font-semibold">Divine</span>
                        <span class="text-gray-400">·</span>
                        <span id="playerMmr" class="text-gray-300">5200 MMR</span>
                    </div>
                </div>
            </div>
            <!-- Поле ввода и кнопка -->
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="text" id="steamIdInput" placeholder="Steam ID / Dota ID" 
                       class="bg-gray-800 rounded-lg px-4 py-2.5 text-white outline-none border border-gray-700 focus:border-red-500 flex-1 md:w-48 placeholder-gray-500 transition-colors">
                <button id="analyzeBtn" class="bg-red-700 hover:bg-red-600 active:bg-red-800 transition-colors text-white font-semibold py-2.5 px-6 rounded-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                    </svg>
                    Анализировать
                </button>
            </div>
        </header>

        <!-- ===== ОВЕРЛЕЙ ЗАГРУЗКИ ===== -->
        <div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-950 bg-opacity-90 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="flex flex-col items-center gap-4">
                <div class="w-16 h-16 border-4 border-gray-700 rounded-full loader"></div>
                <p class="text-xl animate-pulse text-red-400 font-semibold">Анализируем матчи...</p>
            </div>
        </div>

        <!-- ===== ПЛЕЙСХОЛДЕР (до анализа) ===== -->
        <div id="placeholder" class="flex-1 flex items-center justify-center py-20">
            <div class="text-center text-gray-500 max-w-md">
                <svg class="w-32 h-32 mx-auto mb-6 text-gray-700" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <p class="text-xl font-light">Введите Steam ID и нажмите «Анализировать», чтобы увидеть разбор последних матчей</p>
            </div>
        </div>

        <!-- ===== ОСНОВНОЙ КОНТЕНТ (после анализа) ===== -->
        <div id="mainContent" class="hidden flex flex-col lg:flex-row gap-6 flex-1">
            
            <!-- САЙДБАР: Список матчей -->
            <aside class="w-full lg:w-1/4 xl:w-1/5 bg-gray-900 rounded-xl p-4 shadow-lg flex flex-col">
                <h2 class="text-lg font-bold text-red-400 flex items-center gap-2 mb-4">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                        <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                    </svg>
                    Последние матчи
                </h2>
                <div id="matchList" class="space-y-2 flex-1">
                    <!-- Динамически заполняется -->
                </div>
            </aside>

            <!-- ГЛАВНЫЙ ЭКРАН: Аналитика -->
            <main class="flex-1 space-y-6">
                
                <!-- Блок: Критические макро-ошибки -->
                <section class="bg-gray-900 rounded-xl p-4 shadow-lg">
                    <h2 class="text-xl font-bold text-red-500 flex items-center gap-2 mb-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                        </svg>
                        Критические макро-ошибки
                    </h2>
                    <div id="errorsContainer" class="space-y-3">
                        <!-- Карточки ошибок -->
                    </div>
                </section>

                <!-- Блок: ИИ-тренер -->
                <section class="bg-gray-900 rounded-xl p-4 shadow-lg">
                    <h2 class="text-xl font-bold text-blue-400 flex items-center gap-2 mb-3">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm3.293 1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L7.586 10 5.293 7.707a1 1 0 010-1.414zM11 12a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                        </svg>
                        Интерактивный ИИ-Тренер
                    </h2>
                    <!-- Чат -->
                    <div id="aiChat" class="space-y-4 mb-4">
                        <!-- Резюме и ответы -->
                    </div>
                    <!-- Кнопки-вопросы -->
                    <div id="questionButtons" class="flex flex-wrap gap-2">
                        <!-- Динамические кнопки -->
                    </div>
                </section>

                <!-- Блок: Сравнение с про-игроком -->
                <section class="bg-gray-900 rounded-xl p-4 shadow-lg">
                    <h2 class="text-xl font-bold text-yellow-400 flex items-center gap-2 mb-3">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                        </svg>
                        Сравнение с Про-игроком (Net Worth по минутам)
                    </h2>
                    <div class="flex justify-center">
                        <svg id="graphSvg" viewBox="0 0 400 200" class="w-full max-w-lg h-48 bg-gray-800 rounded-lg"></svg>
                    </div>
                    <div class="flex justify-center gap-6 mt-2 text-sm text-gray-400">
                        <span class="flex items-center gap-2"><span class="w-5 h-0.5 bg-blue-500 inline-block"></span> Вы</span>
                        <span class="flex items-center gap-2"><span class="w-5 h-0.5 bg-yellow-400 inline-block"></span> Про-игрок</span>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <!-- База данных героев -->
    <script src="heroes-data.js"></script>
    <!-- Движок анализа -->
    <script src="rules-engine.js"></script>
    <!-- Основной скрипт -->
    <script src="script.js"></script>
</body>
</html>
